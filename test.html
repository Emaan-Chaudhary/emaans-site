<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Project Click</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 p-8">
    <h1 class="text-white text-2xl mb-4">Click Test - Check console (F12)</h1>
    
    <div class="project-card group relative rounded-xl overflow-hidden border border-purple-200 hover:shadow-xl max-w-md" 
         data-project="serverless-form"
         style="background: white; cursor: pointer;">
        <div class="h-48 bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center">
            <p class="text-white text-4xl">📦</p>
        </div>
        <div class="p-6">
            <h3 class="text-xl font-bold mb-2">Test Project</h3>
            <p class="text-sm mb-4">Click anywhere on this card</p>
            <a href="https://github.com" target="_blank" 
               class="text-sm text-blue-600 hover:text-blue-800"
               onclick="event.stopPropagation()">
                Direct GitHub Link (should work)
            </a>
        </div>
        <div class="project-overlay absolute inset-0 bg-blue-600/90 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer">
            <span class="text-white font-semibold">Click to visit GitHub →</span>
        </div>
    </div>

    <script>
        const projectData = {
            'serverless-form': {
                github: 'https://github.com/Emaan-Chaudhary/aws-serverless-form-app'
            }
        };

        console.log('Script loaded');
        const card = document.querySelector('.project-card');
        console.log('Card found:', card);

        card.addEventListener('click', function(e) {
            console.log('Card clicked!');
            console.log('Target:', e.target);
            console.log('Is link?', e.target.tagName === 'A');
            
            if (e.target.tagName === 'A' || e.target.closest('a')) {
                console.log('Link clicked, skipping redirect');
                return;
            }
            
            const projectId = this.getAttribute('data-project');
            console.log('Project ID:', projectId);
            
            if (projectId && projectData[projectId]) {
                console.log('Opening:', projectData[projectId].github);
                window.open(projectData[projectId].github, '_blank');
            }
        });
    </script>
</body>
</html>
